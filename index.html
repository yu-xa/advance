<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Video Stream</title>
  <style>
    /* Dark Cinematic Minimalist Interface */
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    /* Strict 2:3 Aspect Ratio Interface Box */
    .crypto-box {
      width: 90vw;
      max-width: 400px;
      height: 135vw;
      max-height: 600px;
      background-color: #0a0a0a;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      box-sizing: border-box;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
    }
    
    .info-text {
      font-size: 1.1rem;
      color: #aaaaaa;
      margin-bottom: 30px;
      letter-spacing: 0.5px;
      line-height: 1.5;
      text-align: center;
      white-space: pre-line;
    }
    
    button {
      background-color: #ffffff;
      color: #000000;
      border: none;
      padding: 16px 35px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s, background-color 0.2s;
      letter-spacing: 0.5px;
      width: 100%;
      box-sizing: border-box;
    }
    
    button:hover {
      transform: scale(1.02);
      background-color: #e6e6e6;
    }
    
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }
    
    .progress-wrapper {
      width: 100%;
      display: none;
    }
    
    .progress-bar {
      width: 100%;
      background-color: #222222;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 15px;
    }
    
    .progress-bar-fill {
      height: 100%;
      background-color: #ffffff;
      width: 0%;
      transition: width 0.1s linear;
    }
    
    .status {
      font-size: 0.8rem;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-align: center;
    }

    /* Red Error Box Styling */
    .error-box {
      border: 2px solid #e74c3c;
      padding: 20px;
      border-radius: 8px;
      color: #e74c3c;
      font-weight: bold;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>

<body>
  
  <!-- THE 2:3 CONTAINER INTERFACE -->
  <div id="interfaceBox" class="crypto-box">
    
    <!-- UI BEFORE / AFTER PROCESSING -->
    <div id="setupUi" style="width: 100%; text-align: center;">
      <div id="fileInfo" class="info-text">Configuring properties...</div>
      <button id="actionBtn" onclick="fetchAndDecrypt()" disabled>Load Data4Play</button>
    </div>
    
    <!-- LOADING SCREEN -->
    <div id="progressWrapper" class="progress-wrapper">
      <div class="progress-bar">
        <div id="progressBar" class="progress-bar-fill"></div>
      </div>
      <div id="status" class="status">Connecting...</div>
    </div>
    
  </div>
  
  <script>
/*

*/
function hexToString(hex) {
  let str = '';
  for (let i = 0; i < hex.length; i += 2) {
    str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
  }
  return str;
}
const whereis = new URLSearchParams(window.location.search);
const incriptedata = whereis.get("inc") || '7b7d';
const jsonString = hexToString(incriptedata);
const file_Data = JSON.parse(jsonString);

    let FILE_URL = "";
    let FIXED_KEY_STRING = "";
    
    // Cryptographic Layout Parameters
    const CHUNK_SIZE = 1024 * 1024;
    const ENCRYPTED_CHUNK_SIZE = CHUNK_SIZE + 16;
    
    let cryptoKey;
    let totalFileBytes = 0;
    
    // Function to render the Error State
    function showErrorBox() {
      const container = document.getElementById("interfaceBox");
      container.innerHTML = `<div class="error-box">ERROR</div>`;
    }

    async function init() {
      // 1. Check if all required keys exist in file_Data
      const requiredKeys = ["created_at", "expire_at", "video_url", "FIXED_KEY_STRING"];
      const keysExist = requiredKeys.every(key => Object.prototype.hasOwnProperty.call(file_Data, key));
      
      if (!keysExist) {
        showErrorBox();
        return; // Terminate execution; content does not load
      }

      // 2. Check if current Unix time is within the allowed timeframe
      const currentUnixTime = Math.floor(Date.now() / 1000);
      if (currentUnixTime < file_Data.created_at || currentUnixTime > file_Data.expire_at) {
        showErrorBox();
        return; // Terminate execution; content does not load
      }

      // If checks pass, populate runtime configuration strings
      FILE_URL = file_Data.video_url;
      FIXED_KEY_STRING = file_Data.FIXED_KEY_STRING;

      try {
        let keyBytes = new TextEncoder().encode(FIXED_KEY_STRING);
        if (keyBytes.length < 32) {
          const padded = new Uint8Array(32);
          padded.set(keyBytes);
          keyBytes = padded;
        } else if (keyBytes.length > 32) {
          keyBytes = keyBytes.slice(0, 32);
        }
        cryptoKey = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
        
        const response = await fetch(FILE_URL, { method: 'HEAD' });
        if (!response.ok) throw new Error();
        
        const contentLength = response.headers.get('Content-Length');
        if (contentLength) {
          totalFileBytes = parseInt(contentLength, 10);
          const sizeMB = (totalFileBytes / (1024 * 1024)).toFixed(2);
          document.getElementById("fileInfo").textContent = `Encrypted Video Asset\n(${sizeMB} MB)`;
        } else {
          document.getElementById("fileInfo").textContent = "Video Asset Ready";
        }
        document.getElementById("actionBtn").disabled = false;
      } catch (e) {
        const info = document.getElementById("fileInfo");
        info.textContent = "Configuration error. Check connection limits or CORS rules.";
        info.style.color = "#e74c3c";
      }
    }
    window.onload = init;
    
    function appendBuffer(buffer1, buffer2) {
      const tmp = new Uint8Array(buffer1.length + buffer2.length);
      tmp.set(buffer1, 0);
      tmp.set(buffer2, buffer1.length);
      return tmp;
    }
    
    async function fetchAndDecrypt() {
      const setupUi = document.getElementById("setupUi");
      const progressWrapper = document.getElementById("progressWrapper");
      const progressBar = document.getElementById("progressBar");
      const status = document.getElementById("status");
      const actionBtn = document.getElementById("actionBtn");
      
      setupUi.style.display = "none";
      progressWrapper.style.display = "block";
      status.textContent = "Streaming Connection Initialized...";
      
      try {
        const response = await fetch(FILE_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const reader = response.body.getReader();
        let loadedBytes = 0;
        let streamBuffer = new Uint8Array(0);
        let iv = null;
        const decryptedChunks = [];
        
        while (true) {
          const { done, value } = await reader.read();
          if (value) {
            loadedBytes += value.byteLength;
            streamBuffer = appendBuffer(streamBuffer, value);
            
            if (!iv && streamBuffer.length >= 12) {
              iv = streamBuffer.slice(0, 12);
              streamBuffer = streamBuffer.slice(12);
            }
            
            while (iv && streamBuffer.length >= ENCRYPTED_CHUNK_SIZE) {
              const chunkToDecrypt = streamBuffer.slice(0, ENCRYPTED_CHUNK_SIZE);
              streamBuffer = streamBuffer.slice(ENCRYPTED_CHUNK_SIZE);
              const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, cryptoKey, chunkToDecrypt);
              decryptedChunks.push(new Uint8Array(decryptedBuffer));
            }
            
            if (totalFileBytes) {
              const percent = Math.min(100, Math.floor((loadedBytes / totalFileBytes) * 100));
              progressBar.style.width = percent + "%";
              status.textContent = `Decrypting: ${percent}%`;
            } else {
              status.textContent = `Streaming blocks...`;
            }
          }
          if (done) break;
        }
        
        if (streamBuffer.length > 0) {
          const decryptedBuffer = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, cryptoKey, streamBuffer);
          decryptedChunks.push(new Uint8Array(decryptedBuffer));
        }
        
        status.textContent = "Packing external player...";
        const finalBlob = new Blob(decryptedChunks, { type: "video/mp4" });
        
        // Convert blob into a secure base64 string data URI
        const readerBase64 = new FileReader();
        readerBase64.readAsDataURL(finalBlob);
        readerBase64.onloadend = function() {
          const base64Data = readerBase64.result;
          
          // Update the 2:3 UI Box
          progressWrapper.style.display = "none";
          setupUi.style.display = "block";
          document.getElementById("fileInfo").textContent = "Video Decrypted Successfully!";
          
          actionBtn.textContent = "▶ Open Player";
          actionBtn.disabled = false;
          
          // EXPORT LOGIC: Post data into a neutral target player window
          actionBtn.onclick = function() {
            const playerWindow = window.open("", "_blank");
            
            // Dynamic Player HTML markup inject
            const playerHTML = `
          <!DOCTYPE html>
          <html>
          <head>
            <title>External Media Stream</title>
            <style>
              body, html { margin:0; padding:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; overflow:hidden; }
              video { width:100vw; height:100vh; object-fit:contain; }
            </style>
          </head>
          <body>
            <video src="${base64Data}" controls autoplay controlsList="nodownload"></video>
          </body>
          </html>
        `;
            
            playerWindow.document.write(playerHTML);
            playerWindow.document.close();
          };
        }
        
      } catch (error) {
        console.error(error);
        progressWrapper.style.display = "none";
        setupUi.style.display = "block";
        const info = document.getElementById("fileInfo");
        info.textContent = `Streaming Error: ${error.message}`;
        info.style.color = "#e74c3c";
      }
    }
  </script>
</body>

</html>
